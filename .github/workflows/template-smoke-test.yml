name: Template Smoke Test

on:
  pull_request:
    paths:
      - "src/components/clinic/**"
      - "src/lib/clinic/**"
      - "src/lib/onboarding/**"
      - "app/sites/**"
      - "app/onboard/**"
      - "src/db/schema.ts"
      - "fixtures/sample-clinic.json"
      - "scripts/test-fixtures.js"

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate fixture for all template variants
        run: node scripts/test-fixtures.js

  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build
