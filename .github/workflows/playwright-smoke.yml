name: Playwright Smoke Tests

# Runs on every push to main against the live Vercel demo URL.
# Requires VERCEL_DEMO_URL to be set as a GitHub Actions repository variable
# (set it once DRE-187 is done and the live URL is known).
# CLINIC_SLUG is optional; defaults to smile-bright-rogers.
on:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: vars.VERCEL_DEMO_URL != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against live Vercel URL
        run: npx playwright test e2e/smoke.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.VERCEL_DEMO_URL }}
          CLINIC_SLUG: ${{ vars.LHCI_CLINIC_SLUG || 'smile-bright-rogers' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
