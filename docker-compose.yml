services:
  postgres:
    image: postgres:16-alpine
    container_name: dream-create-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dream
      POSTGRES_PASSWORD: dream
      POSTGRES_DB: dream_create
    ports:
      - "5432:5432"
    volumes:
      - dream_create_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dream -d dream_create"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dream_create_pgdata:
